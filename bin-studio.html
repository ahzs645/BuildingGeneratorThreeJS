<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dojo Bin Studio · interactive baked bin</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0d10; }
      #app { width: 100vw; height: 100vh; display: block; }
      #hud {
        position: fixed; left: 16px; top: 14px; z-index: 10; max-width: 72ch;
        font: 12px/1.6 ui-monospace, Menlo, monospace; color: #9fb4c7;
        letter-spacing: .03em; pointer-events: none; text-shadow: 0 1px 2px #000;
      }
      #hud b { color: #eaf2f8; text-transform: uppercase; }
      #hud .ok { color: #9fe0a4; }
      #home {
        position: fixed; left: 16px; bottom: 14px; z-index: 20;
        font: 600 11px/1 ui-monospace, Menlo, monospace; letter-spacing: 0.1em; text-transform: uppercase;
        color: #9fb4c7; text-decoration: none; padding: 8px 12px; border: 1px solid rgba(255,255,255,0.12);
        border-radius: 999px; background: rgba(11,13,16,0.6);
      }
      #home:hover { color: #eaf2f8; border-color: rgba(143,207,255,0.5); }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <a id="home" href="/">← studio</a>
    <div id="hud"><b>Dojo Bin Studio</b> · pre-baked from the .blend, 100% Blender fidelity · <span id="stat">loading…</span></div>
    <script type="module" src="/src/bin-studio.ts"></script>
  </body>
</html>
